<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="css/style.css">
    <title>Jogo de Plataforma - Personagens</title>
</head>

<body>
    <!-- ========== LAYOUT DESKTOP ========== -->
    <div class="desktop-layout">
        <div class="tutorial-panel">
            <h2>🎮 CONTROLES</h2>

            <div class="tutorial-item">
                <span class="key">A</span>
                <span class="key">←</span>
                <span class="action">Mover Esquerda</span>
            </div>

            <div class="tutorial-item">
                <span class="key">D</span>
                <span class="key">→</span>
                <span class="action">Mover Direita</span>
            </div>

            <div class="tutorial-item">
                <span class="key">ESPAÇO</span>
                <span class="action">Pular</span>
            </div>

            <div class="game-info">
                <p>
                    <strong>💡 Objetivo:</strong><br>
                    Encontre todos os personagens com 💬 para conhecê-los!
                    <br><br>
                    Depois vá até a saída para avançar de fase!
                </p>
            </div>
        </div>

        <div class="game-container">
            <canvas id="desenho1" width="800" height="512"></canvas>
        </div>
    </div>

    <!-- ========== LAYOUT MOBILE (GAMEBOY) ========== -->
    <div class="mobile-layout">
        <div class="gameboy-header">
            <h1>🎮 GAME</h1>
        </div>

        <div class="gameboy-screen">
            <canvas id="desenho1-mobile" width="800" height="512"></canvas>
        </div>

        <div class="gameboy-controls">
            <!-- D-PAD -->
            <div class="dpad-container">
                <div class="dpad">
                    <div class="dpad-button dpad-left" id="btnEsquerda">⬅</div>
                    <div class="dpad-button dpad-right" id="btnDireita">➡</div>
                    <div class="dpad-button dpad-up" id="btnCima">⬆</div>
                </div>
            </div>

            <!-- ACTION BUTTONS -->
            <div class="action-buttons">
                <div class="action-button jump" id="btnPular">A</div>
            </div>
        </div>
    </div>

    <!-- ========== TELA DE FIM DE JOGO ========== -->
    <div id="telaFimDeJogo" class="tela-fim hidden">
        <div class="conteudo-fim">
            <h1>🎉 PARABÉNS! 🎉</h1>
            <h2>Você finalizou o jogo!</h2>
            <p>Conheceu todos os personagens!</p>
            <button id="btnJogarNovamente" class="btn-grande">🔄 Jogar Novamente</button>
        </div>
    </div>

    <!-- ========== BOTÃO RECARREGAR ========== -->
    <button id="btnRecarregar">🔄 Recarregar</button>

    <!-- ========== SCRIPT DE INICIALIZAÇÃO ========== -->
    <script>
        // Detectar dispositivo e configurar canvas correto
        const isMobile = window.innerWidth <= 768;
        let canvas;

        if (isMobile) {
            canvas = document.getElementById('desenho1-mobile');
        } else {
            canvas = document.getElementById('desenho1');
        }

        // Sobrescrever getElementById para retornar o canvas correto
        const originalGetElementById = document.getElementById.bind(document);
        document.getElementById = function (id) {
            if (id === 'desenho1') {
                return canvas;
            }
            return originalGetElementById(id);
        };
    </script>

    <!-- ========== SCRIPTS DO JOGO ========== -->
    <script type="text/javascript" src="Jogador.js"></script>
    <script type="text/javascript" src="Mapa.js"></script>
    <script type="text/javascript" src="Tileset.js"></script>
    <script type="text/javascript" src="Personagens.js"></script>
    <script type="text/javascript" src="Personagem.js"></script>
    <script type="text/javascript" src="DialogSystem.js"></script>
    <script type="text/javascript" src="assets/levels/levels.js"></script>
    <script type="text/javascript" src="Game.js"></script>
</body>

</html>
